name: Almayadeen News Scraper Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install beautifulsoup4 requests python-telegram-bot APScheduler groq lxml pytz feedparser
        
    - name: Create data directory
      run: mkdir -p data
        
    - name: Restore articles database
      uses: actions/cache@v4
      with:
        path: data/articles.json
        key: articles-${{ github.run_number }}
        restore-keys: articles-
        
    - name: Run news scraper
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python3 << 'EOF'
        import sys
        sys.path.insert(0, '.')
        
        from src.scheduler import NewsScheduler
        import logging
        
        logging.basicConfig(level=logging.INFO)
        logger = logging.getLogger(__name__)
        
        try:
            logger.info("Starting scraper...")
            scheduler = NewsScheduler()
            scheduler.scrape_and_notify()
            logger.info("✅ Scraping completed!")
        except Exception as e:
            logger.error(f"❌ Error: {e}")
            import traceback
            traceback.print_exc()
            sys.exit(1)
        EOF
        
    - name: Send daily summary if needed
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python3 << 'EOF'
        import sys
        sys.path.insert(0, '.')
        
        from datetime import datetime
        from config.config import Config
        from src.scheduler import NewsScheduler
        import logging
        
        logging.basicConfig(level=logging.INFO)
        now = datetime.now(Config.TIMEZONE)
        
        if now.hour == 23 and now.minute >= 55:
            NewsScheduler().send_daily_summary()
            print("✅ Daily summary sent")
        else:
            print(f"⏰ Not summary time yet ({now.hour}:{now.minute})")
        EOF
        
    - name: Save articles database
      uses: actions/cache@v4
      with:
        path: data/articles.json
        key: articles-${{ github.run_number }}
