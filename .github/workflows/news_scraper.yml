name: Almayadeen News Scraper Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data logs
        
    - name: Restore articles database
      uses: actions/cache@v3
      with:
        path: data/articles.json
        key: articles-db-${{ github.run_number }}
        restore-keys: |
          articles-db-
          
    - name: Run news scraper
      run: |
        python -c "
        from src.scheduler import NewsScheduler
        import logging
        logging.basicConfig(level=logging.INFO)
        scheduler = NewsScheduler()
        scheduler.scrape_and_notify()
        print('✅ Scraping completed')
        "
        
    - name: Check and send daily summary
      run: |
        python -c "
        from datetime import datetime
        from config.config import Config
        from src.scheduler import NewsScheduler
        import logging
        
        logging.basicConfig(level=logging.INFO)
        now = datetime.now(Config.TIMEZONE)
        
        if now.hour == 23 and now.minute >= 55:
            scheduler = NewsScheduler()
            scheduler.send_daily_summary()
            print('✅ Daily summary sent')
        else:
            print('⏰ Not time for daily summary yet')
        "
        
    - name: Save articles database
      uses: actions/cache@v3
      with:
        path: data/articles.json
        key: articles-db-${{ github.run_number }}
        
    - name: Upload logs
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: error-logs
        path: logs/
        retention-days: 7
